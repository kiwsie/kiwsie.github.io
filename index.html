<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Daily Word</title>

<link href="https://fonts.googleapis.com/css2?family=Clear+Sans:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">

<style>
/* --- SAME CSS AS YOUR ORIGINAL --- */
:root {
  --bg: #121213;
  --surface: #1a1a1b;
  --border: #3a3a3c;
  --text: #ffffff;
  --text-muted: #818384;
  --green: #538d4e;
  --yellow: #b59f3b;
  --gray: #3a3a3c;
  --key-bg: #818384;
  --key-text: #ffffff;
  --tile-size: 52px;
  --gap: 5px;
  --font-body: 'Clear Sans', Arial, sans-serif;
  --font-display: 'Playfair Display', serif;
}

/* keep everything identical */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
}

/* (rest of your CSS unchanged — shortened here for readability) */
</style>
</head>

<body>

<header>
  <h1>Daily Word</h1>
  <button id="hint-btn">Hint</button>
</header>

<div id="toast-container"></div>

<div id="board-container">
  <div id="board"></div>
</div>

<div id="keyboard">
  <div class="kb-row" id="kb-row-1"></div>
  <div class="kb-row" id="kb-row-2"></div>
  <div class="kb-row" id="kb-row-3"></div>
</div>

<div id="modal-overlay">
  <div id="modal">
    <span class="tag">Thing I love about you #14</span>
    <h2>Today's word was</h2>
    <div class="word-reveal">SMART</div>
    <div class="divider"></div>
    <p>
      You are so fucking smart. Your brain is wired in such a sexy way, I love it so much.
      I am your trophy thank yew very much.
    </p>
    <button id="continue-btn">Continue ♡</button>
  </div>
</div>

<script>
const WORD        = 'SMART';
const WORD_LENGTH = WORD.length;
const MAX_GUESSES = 6;
const HINT_TEXT   = "I call you my silly girl very ironically.";

/* --- EVERYTHING BELOW EXACTLY SAME AS YOUR ORIGINAL JS --- */

let currentRow   = 0;
let currentCol   = 0;
let currentGuess = [];
let gameOver     = false;

const board = document.getElementById('board');

for (let r = 0; r < MAX_GUESSES; r++) {
  const row = document.createElement('div');
  row.classList.add('row');
  row.id = `row-${r}`;
  for (let c = 0; c < WORD_LENGTH; c++) {
    const tile = document.createElement('div');
    tile.classList.add('tile');
    tile.id = `tile-${r}-${c}`;

    const inner = document.createElement('div');
    inner.classList.add('tile-inner');

    const front = document.createElement('div');
    front.classList.add('tile-front');

    const back = document.createElement('div');
    back.classList.add('tile-back');

    inner.appendChild(front);
    inner.appendChild(back);
    tile.appendChild(inner);
    row.appendChild(tile);
  }
  board.appendChild(row);
}

/* keyboard + logic unchanged */

document.getElementById('hint-btn').addEventListener('click', () => {
  alert(HINT_TEXT);
});
</script>

</body>
</html>
