<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Daily Word</title>

<link href="https://fonts.googleapis.com/css2?family=Clear+Sans:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #121213;
  --surface: #1a1a1b;
  --border: #3a3a3c;
  --text: #ffffff;
  --text-muted: #818384;
  --green: #538d4e;
  --yellow: #b59f3b;
  --gray: #3a3a3c;
  --key-bg: #818384;
  --key-text: #ffffff;
  --tile-size: 52px;
  --gap: 5px;
  --font-body: 'Clear Sans', Arial, sans-serif;
  --font-display: 'Playfair Display', serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  display: flex;
  flex-direction: column;
  align-items: center;
}

header {
  width: 100%;
  max-width: 600px;
  display: flex;
  justify-content: center;
  padding: 14px;
  border-bottom: 1px solid var(--border);
  position: relative;
}

#hint-btn {
  position: absolute;
  right: 16px;
  border: 1px solid var(--border);
  background: none;
  color: var(--text-muted);
  padding: 6px 10px;
  cursor: pointer;
}

#board {
  margin: 30px 0;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.row {
  display: flex;
  gap: 5px;
}

.tile {
  width: 52px;
  height: 52px;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 1.5rem;
}

.correct { background: var(--green); }
.present { background: var(--yellow); }
.absent  { background: var(--gray); }

#keyboard {
  max-width: 500px;
}

.key {
  padding: 10px;
  margin: 3px;
  cursor: pointer;
  background: var(--key-bg);
  border: none;
  color: white;
}

#modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
}

#modal-overlay.visible { display: flex; }

#modal {
  background: #1a1a1b;
  padding: 30px;
  border-radius: 10px;
  text-align: center;
}

.word-reveal {
  font-size: 2rem;
  color: var(--green);
}
</style>
</head>

<body>

<header>
  <h1>Daily Word</h1>
  <button id="hint-btn">Hint</button>
</header>

<div id="board"></div>

<div id="keyboard"></div>

<div id="modal-overlay">
  <div id="modal">
    <div>Thing I love about you #14</div>
    <h3>Today's word was</h3>
    <div class="word-reveal">SMART</div>
    <p>
      You are so fucking smart. Your brain is wired in such a sexy way, I love it so much. 
      I am your trophy thank yew very much.
    </p>
    <button onclick="closeModal()">Continue ♡</button>
  </div>
</div>

<script>
const WORD = "SMART";
let current = "";
let row = 0;

const board = document.getElementById("board");

// create board
for (let i = 0; i < 6; i++) {
  const r = document.createElement("div");
  r.className = "row";
  for (let j = 0; j < WORD.length; j++) {
    const t = document.createElement("div");
    t.className = "tile";
    r.appendChild(t);
  }
  board.appendChild(r);
}

// keyboard
const keys = "QWERTYUIOPASDFGHJKLZXCVBNM";
const kb = document.getElementById("keyboard");

keys.split("").forEach(k => {
  const b = document.createElement("button");
  b.textContent = k;
  b.className = "key";
  b.onclick = () => press(k);
  kb.appendChild(b);
});

function press(letter) {
  if (current.length < WORD.length) {
    current += letter;
    update();
  }
}

document.addEventListener("keydown", e => {
  if (e.key === "Enter") submit();
  else if (e.key === "Backspace") {
    current = current.slice(0, -1);
    update();
  } else if (/^[a-zA-Z]$/.test(e.key)) {
    press(e.key.toUpperCase());
  }
});

function update() {
  const tiles = board.children[row].children;
  for (let i = 0; i < WORD.length; i++) {
    tiles[i].textContent = current[i] || "";
  }
}

function submit() {
  if (current.length !== WORD.length) return;

  const tiles = board.children[row].children;

  for (let i = 0; i < WORD.length; i++) {
    if (current[i] === WORD[i]) {
      tiles[i].classList.add("correct");
    } else if (WORD.includes(current[i])) {
      tiles[i].classList.add("present");
    } else {
      tiles[i].classList.add("absent");
    }
  }

  if (current === WORD) {
    setTimeout(() => {
      document.getElementById("modal-overlay").classList.add("visible");
    }, 800);
    return;
  }

  row++;
  current = "";
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("visible");
}

document.getElementById("hint-btn").onclick = () => {
  alert("I call you my silly girl very ironically.");
};
</script>

</body>
</html>
