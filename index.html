<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Daily Word</title>
<link href="https://fonts.googleapis.com/css2?family=Clear+Sans:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">

<style>
:root{
--bg:#121213;
--border:#3a3a3c;
--text:#fff;
--text-muted:#818384;
--green:#538d4e;
--yellow:#b59f3b;
--gray:#3a3a3c;
--key-bg:#818384;
--tile-size:52px;
--gap:5px;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
background:var(--bg);
color:var(--text);
font-family:'Clear Sans',Arial,sans-serif;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

header{
width:100%;
max-width:600px;
display:flex;
justify-content:center;
padding:14px 16px;
border-bottom:1px solid var(--border);
position:relative;
}

h1{
font-size:1.75rem;
font-weight:700;
letter-spacing:.08em;
text-transform:uppercase;
}

#hint-btn{
position:absolute;
right:16px;
background:none;
border:1px solid var(--border);
color:var(--text-muted);
padding:6px 12px;
border-radius:4px;
cursor:pointer;
}

#toast-container{
position:fixed;
top:70px;
left:50%;
transform:translateX(-50%);
z-index:100;
}

.toast{
background:#fff;
color:#000;
padding:10px 18px;
border-radius:6px;
font-weight:700;
}

#board-container{
flex:1;
display:flex;
align-items:center;
justify-content:center;
padding:20px 0;
}

#board{
display:flex;
flex-direction:column;
gap:var(--gap);
}

.row{
display:flex;
gap:var(--gap);
}

.tile{
width:var(--tile-size);
height:var(--tile-size);
border:2px solid var(--border);
display:flex;
align-items:center;
justify-content:center;
font-size:1.5rem;
font-weight:700;
text-transform:uppercase;
perspective:250px;
}

.tile-inner{
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
position:relative;
transform-style:preserve-3d;
}

.tile-front,.tile-back{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
backface-visibility:hidden;
}

.tile-back{
transform:rotateX(180deg);
}

.tile.correct .tile-inner{background:var(--green);}
.tile.present .tile-inner{background:var(--yellow);}
.tile.absent .tile-inner{background:var(--gray);}

#keyboard{
width:100%;
max-width:520px;
padding:0 8px 24px;
display:flex;
flex-direction:column;
gap:8px;
}

.kb-row{
display:flex;
justify-content:center;
gap:6px;
}

.key{
height:58px;
min-width:40px;
border:none;
border-radius:4px;
background:var(--key-bg);
color:white;
font-weight:700;
flex:1;
max-width:43px;
cursor:pointer;
}

.key.wide{max-width:65px;}

.key.correct{background:var(--green);}
.key.present{background:var(--yellow);}
.key.absent{background:var(--gray);}

#modal-overlay{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
z-index:300;
align-items:center;
justify-content:center;
}

#modal-overlay.visible{
display:flex;
}

#modal{
background:#1a1a1b;
border:1px solid var(--border);
border-radius:12px;
padding:40px 36px;
max-width:420px;
width:90%;
text-align:center;
}

.tag{
font-size:.72rem;
letter-spacing:.15em;
color:var(--text-muted);
display:block;
margin-bottom:20px;
}

#modal h2{
font-family:'Playfair Display',serif;
font-style:italic;
margin-bottom:8px;
}

.word-reveal{
font-size:2.2rem;
font-weight:700;
letter-spacing:.18em;
color:var(--green);
margin-bottom:24px;
}

#modal p{
font-family:'Playfair Display',serif;
font-style:italic;
line-height:1.75;
margin-bottom:32px;
}

#continue-btn{
background:#fff;
color:#000;
border:none;
padding:14px 36px;
border-radius:6px;
font-weight:700;
cursor:pointer;
}

@media(max-width:480px){
:root{--tile-size:40px;}
}
</style>
</head>

<body>

<header>
<h1>Daily Word</h1>
<button id="hint-btn">Hint</button>
</header>

<div id="toast-container"></div>

<div id="board-container">
<div id="board"></div>
</div>

<div id="keyboard">
<div class="kb-row" id="kb-row-1"></div>
<div class="kb-row" id="kb-row-2"></div>
<div class="kb-row" id="kb-row-3"></div>
</div>

<div id="modal-overlay">
<div id="modal">

<span class="tag">Thing I love about you #3</span>

<h2>Today's word was</h2>

<div class="word-reveal">CRAZY</div>

<div style="width:40px;height:1px;background:#3a3a3c;margin:0 auto 24px;"></div>

<p>
I love how cuckoo you are my crazy ass muah.
Keep up the game, I will be out-crazying you for the rest of our lives.
</p>

<button id="continue-btn">Continue ♡</button>

</div>
</div>

<script>
const WORD='CRAZY';
const WORD_LENGTH=WORD.length;
const MAX_GUESSES=6;

const HINT_TEXT="this actually turns me on ;)";

let currentRow=0;
let currentCol=0;
let currentGuess=[];
let gameOver=false;

const board=document.getElementById('board');

for(let r=0;r<MAX_GUESSES;r++){
let row=document.createElement('div');
row.classList.add('row');
row.id=`row-${r}`;

for(let c=0;c<WORD_LENGTH;c++){
let tile=document.createElement('div');
tile.classList.add('tile');
tile.id=`tile-${r}-${c}`;

let inner=document.createElement('div');
inner.classList.add('tile-inner');

let front=document.createElement('div');
front.classList.add('tile-front');

let back=document.createElement('div');
back.classList.add('tile-back');

inner.append(front,back);
tile.appendChild(inner);
row.appendChild(tile);
}

board.appendChild(row);
}

const KB_ROWS=[
['Q','W','E','R','T','Y','U','I','O','P'],
['A','S','D','F','G','H','J','K','L'],
['ENTER','Z','X','C','V','B','N','M','⌫']
];

KB_ROWS.forEach((keys,i)=>{
let rowEl=document.getElementById(`kb-row-${i+1}`);

keys.forEach(k=>{
let btn=document.createElement('button');
btn.classList.add('key');
if(k==='ENTER'||k==='⌫')btn.classList.add('wide');
btn.textContent=k;
btn.dataset.key=k;
btn.onclick=()=>handleKey(k);
rowEl.appendChild(btn);
});
});

document.addEventListener('keydown',e=>{
if(gameOver)return;

if(e.key==='Enter')handleKey('ENTER');
else if(e.key==='Backspace')handleKey('⌫');
else if(/^[a-zA-Z]$/.test(e.key))handleKey(e.key.toUpperCase());
});

function handleKey(key){
if(gameOver)return;

if(key==='⌫')deleteLetter();
else if(key==='ENTER')submitGuess();
else addLetter(key);
}

function addLetter(letter){
if(currentCol>=WORD_LENGTH)return;

currentGuess.push(letter);

let tile=getTile(currentRow,currentCol);
tile.querySelector('.tile-front').textContent=letter;
tile.querySelector('.tile-back').textContent=letter;

currentCol++;
}

function deleteLetter(){
if(currentCol<=0)return;

currentCol--;
currentGuess.pop();

let tile=getTile(currentRow,currentCol);

tile.querySelector('.tile-front').textContent='';
tile.querySelector('.tile-back').textContent='';
}

function submitGuess(){

if(currentCol<WORD_LENGTH){
showToast("Not enough letters");
return;
}

let guess=currentGuess.join('');
let result=evaluate(guess);

revealRow(currentRow,result,()=>{

updateKeyboard(guess,result);

if(guess===WORD){
gameOver=true;
setTimeout(showModal,1200);
}
else{
currentRow++;
currentCol=0;
currentGuess=[];

if(currentRow>=MAX_GUESSES){
gameOver=true;
showToast(WORD);
}
}

});

}

function evaluate(guess){

let result=Array(WORD_LENGTH).fill('absent');

let wordArr=WORD.split('');
let guessArr=guess.split('');
let used=Array(WORD_LENGTH).fill(false);

for(let i=0;i<WORD_LENGTH;i++){
if(guessArr[i]===wordArr[i]){
result[i]='correct';
used[i]=true;
}
}

for(let i=0;i<WORD_LENGTH;i++){

if(result[i]==='correct')continue;

for(let j=0;j<WORD_LENGTH;j++){

if(!used[j]&&guessArr[i]===wordArr[j]){
result[i]='present';
used[j]=true;
break;
}

}

}

return result;
}

function revealRow(row,result,callback){

for(let c=0;c<WORD_LENGTH;c++){

setTimeout(()=>{

let tile=getTile(row,c);

tile.classList.add(result[c]);

tile.querySelector('.tile-inner').style.transform='rotateX(360deg)';

},c*300);

}

setTimeout(callback,WORD_LENGTH*300+500);

}

function updateKeyboard(guess,result){

for(let i=0;i<WORD_LENGTH;i++){

let btn=document.querySelector(`.key[data-key="${guess[i]}"]`);

if(btn)btn.classList.add(result[i]);

}

}

function showToast(msg){

let container=document.getElementById('toast-container');

let toast=document.createElement('div');
toast.classList.add('toast');
toast.textContent=msg;

container.appendChild(toast);

setTimeout(()=>toast.remove(),3000);

}

function showModal(){
document.getElementById('modal-overlay').classList.add('visible');
}

document.getElementById('continue-btn').onclick=()=>{
document.getElementById('modal-overlay').classList.remove('visible');
};

document.getElementById('hint-btn').onclick=()=>{
showToast(HINT_TEXT);
};

function getTile(r,c){
return document.getElementById(`tile-${r}-${c}`);
}
</script>

</body>
</html>
