<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Word #17</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Cormorant+Garamond:ital,wght@0,700;1,400;1,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e10;
      --surface: #17171a;
      --border: #2e2e33;
      --text: #f0ece4;
      --text-muted: #6b6870;
      --green: #4e8c6a;
      --yellow: #b59a3b;
      --gray: #2e2e33;
      --key-bg: #2a2a30;
      --key-text: #c8c4bc;
      --tile-size: 52px;
      --gap: 5px;
      --font-body: 'DM Mono', 'Courier New', monospace;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --modal-bg: #131316;
      --accent: #c4a882;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    header {
      width: 100%;
      max-width: 600px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 1;
    }

    .header-left {
      position: absolute;
      left: 16px;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    header h1 {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 0.85rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text);
    }

    #hint-btn {
      position: absolute;
      right: 16px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.6rem;
      font-family: var(--font-body);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 5px 10px;
      border-radius: 2px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    #hint-btn:hover { color: var(--accent); border-color: var(--accent); }

    #toast-container {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      background: var(--text);
      color: var(--bg);
      padding: 10px 18px;
      border-radius: 2px;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-align: center;
      max-width: 360px;
      font-family: var(--font-body);
      opacity: 1;
      transition: opacity 0.3s ease;
      animation: toastIn 0.2s ease;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

    #board-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 0 10px;
      position: relative;
      z-index: 1;
    }

    #board {
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }

    .row {
      display: flex;
      flex-direction: row;
      gap: var(--gap);
    }

    .tile {
      width: var(--tile-size);
      height: var(--tile-size);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.15rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      user-select: none;
      position: relative;
      perspective: 250px;
    }
    .tile[data-letter] { border-color: #4a4a52; }
    .tile.pop { animation: tilePop 0.1s ease; }
    @keyframes tilePop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
    .row.shake { animation: rowShake 0.5s ease; }
    @keyframes rowShake {
      0%, 100% { transform: translateX(0); }
      10%, 50%, 90% { transform: translateX(-4px); }
      30%, 70% { transform: translateX(4px); }
    }
    .tile.bounce { animation: tileBounce 0.6s ease forwards; }
    @keyframes tileBounce {
      0%   { transform: translateY(0); }
      40%  { transform: translateY(-18px); }
      60%  { transform: translateY(-9px); }
      80%  { transform: translateY(-14px); }
      100% { transform: translateY(0); }
    }

    .tile-inner {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-style: preserve-3d;
      transition: transform 0.5s ease;
      position: relative;
    }
    .tile-front, .tile-back {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
    }
    .tile-back { transform: rotateX(180deg); }

    .tile.correct .tile-inner { background: var(--green); }
    .tile.present .tile-inner { background: var(--yellow); }
    .tile.absent  .tile-inner { background: var(--gray); }
    .tile.correct { border-color: var(--green); }
    .tile.present { border-color: var(--yellow); }
    .tile.absent  { border-color: var(--gray); }

    #keyboard {
      width: 100%;
      max-width: 500px;
      padding: 0 8px 28px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      position: relative;
      z-index: 1;
    }
    .kb-row {
      display: flex;
      justify-content: center;
      gap: 5px;
    }
    .key {
      height: 54px;
      min-width: 40px;
      border-radius: 2px;
      background: var(--key-bg);
      color: var(--key-text);
      font-family: var(--font-body);
      font-size: 0.72rem;
      font-weight: 500;
      text-transform: uppercase;
      border: 1px solid #232328;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
      letter-spacing: 0.05em;
      transition: background 0.2s, color 0.2s, transform 0.08s;
      flex: 1;
      max-width: 40px;
      user-select: none;
    }
    .key.wide { max-width: 62px; font-size: 0.62rem; letter-spacing: 0.08em; }
    .key:active { transform: scale(0.93); }
    .key.correct { background: var(--green); border-color: var(--green); color: #fff; }
    .key.present { background: var(--yellow); border-color: var(--yellow); color: #fff; }
    .key.absent  { background: #1a1a1e; border-color: #1a1a1e; color: #3a3a40; }

    /* Modal */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 300;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    #modal-overlay.visible { display: flex; }

    #modal {
      background: var(--modal-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 48px 40px 40px;
      max-width: 440px;
      width: 92%;
      text-align: center;
      position: relative;
      animation: modalSlideIn 0.5s cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
    }
    @keyframes modalSlideIn {
      from { opacity: 0; transform: translateY(28px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-number {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 28px;
      display: block;
    }

    .modal-label {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-bottom: 6px;
      display: block;
      letter-spacing: 0.02em;
    }

    .word-reveal {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 1.5rem;
      letter-spacing: 0.35em;
      color: var(--accent);
      margin-bottom: 32px;
      text-transform: uppercase;
    }

    .modal-rule {
      width: 32px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 0 auto 28px;
    }

    #modal p {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1.08rem;
      line-height: 1.85;
      color: #c8c2b8;
      margin-bottom: 36px;
      padding: 0 4px;
    }

    #continue-btn {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 12px 36px;
      border-radius: 2px;
      font-family: var(--font-body);
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, transform 0.1s;
    }
    #continue-btn:hover { background: var(--accent); color: var(--bg); }
    #continue-btn:active { transform: scale(0.97); }

    @media (max-width: 520px) {
      :root { --tile-size: 36px; --gap: 4px; }
      .tile { font-size: 0.9rem; }
      .key { height: 44px; min-width: 28px; max-width: 28px; font-size: 0.58rem; }
      .key.wide { max-width: 46px; font-size: 0.52rem; }
      #modal { padding: 36px 24px 30px; }
      #modal p { font-size: 0.98rem; }
    }
  </style>
</head>
<body>
<header>
  <span class="header-left">No. 17</span>
  <h1>Daily Word</h1>
  <button id="hint-btn">Hint</button>
</header>

<div id="toast-container"></div>

<div id="board-container">
  <div id="board"></div>
</div>

<div id="keyboard">
  <div class="kb-row" id="kb-row-1"></div>
  <div class="kb-row" id="kb-row-2"></div>
  <div class="kb-row" id="kb-row-3"></div>
</div>

<div id="modal-overlay">
  <div id="modal">
    <span class="modal-number">Thing I love about you · No. 17</span>
    <span class="modal-label">Today's word was</span>
    <div class="word-reveal">GENUINE</div>
    <div class="modal-rule"></div>
    <p>I love how genuine and true to your words you are. This is something so rare to find in people, and I am so lucky to have this in my life, in my person.</p>
    <button id="continue-btn">Continue ♡</button>
  </div>
</div>

<script>
  const WORD        = 'GENUINE';
  const WORD_LENGTH = WORD.length;
  const MAX_GUESSES = 9;
  const HINT_TEXT   = 'Everything about you is so real. Everything you do for me, I feel it in my heart. Muah.';

  let currentRow   = 0;
  let currentCol   = 0;
  let currentGuess = [];
  let gameOver     = false;

  // Build board
  const board = document.getElementById('board');
  for (let r = 0; r < MAX_GUESSES; r++) {
    const row = document.createElement('div');
    row.classList.add('row');
    row.id = `row-${r}`;
    for (let c = 0; c < WORD_LENGTH; c++) {
      const tile = document.createElement('div');
      tile.classList.add('tile');
      tile.id = `tile-${r}-${c}`;
      const inner = document.createElement('div');
      inner.classList.add('tile-inner');
      const front = document.createElement('div');
      front.classList.add('tile-front');
      const back = document.createElement('div');
      back.classList.add('tile-back');
      inner.appendChild(front);
      inner.appendChild(back);
      tile.appendChild(inner);
      row.appendChild(tile);
    }
    board.appendChild(row);
  }

  // Build keyboard
  const KB_ROWS = [
    ['Q','W','E','R','T','Y','U','I','O','P'],
    ['A','S','D','F','G','H','J','K','L'],
    ['ENTER','Z','X','C','V','B','N','M','⌫']
  ];
  KB_ROWS.forEach((keys, i) => {
    const rowEl = document.getElementById(`kb-row-${i + 1}`);
    keys.forEach(k => {
      const btn = document.createElement('button');
      btn.classList.add('key');
      btn.textContent = k;
      btn.dataset.key = k;
      if (k === 'ENTER' || k === '⌫') btn.classList.add('wide');
      btn.addEventListener('click', () => handleKey(k));
      rowEl.appendChild(btn);
    });
  });

  document.addEventListener('keydown', e => {
    if (gameOver) return;
    if (e.key === 'Enter') handleKey('ENTER');
    else if (e.key === 'Backspace') handleKey('⌫');
    else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toUpperCase());
  });

  function handleKey(key) {
    if (gameOver) return;
    if (key === '⌫') deleteLetter();
    else if (key === 'ENTER') submitGuess();
    else if (/^[A-Z]$/.test(key)) addLetter(key);
  }

  function addLetter(letter) {
    if (currentCol >= WORD_LENGTH) return;
    currentGuess.push(letter);
    const tile = getTile(currentRow, currentCol);
    tile.querySelector('.tile-front').textContent = letter;
    tile.querySelector('.tile-back').textContent  = letter;
    tile.dataset.letter = letter;
    tile.classList.remove('pop');
    void tile.offsetWidth;
    tile.classList.add('pop');
    currentCol++;
  }

  function deleteLetter() {
    if (currentCol <= 0) return;
    currentCol--;
    currentGuess.pop();
    const tile = getTile(currentRow, currentCol);
    tile.querySelector('.tile-front').textContent = '';
    tile.querySelector('.tile-back').textContent  = '';
    delete tile.dataset.letter;
  }

  function submitGuess() {
    if (currentCol < WORD_LENGTH) {
      showToast('Not enough letters');
      shakeRow(currentRow);
      return;
    }
    const guess  = currentGuess.join('');
    const result = evaluate(guess);
    revealRow(currentRow, guess, result, () => {
      updateKeyboard(guess, result);
      if (guess === WORD) {
        bounceRow(currentRow);
        gameOver = true;
        setTimeout(showModal, 1400);
      } else {
        currentRow++;
        currentCol   = 0;
        currentGuess = [];
        if (currentRow >= MAX_GUESSES) {
          gameOver = true;
          setTimeout(() => showToast(WORD, 4000), 400);
        }
      }
    });
  }

  function evaluate(guess) {
    const result    = Array(WORD_LENGTH).fill('absent');
    const wordArr   = WORD.split('');
    const guessArr  = guess.split('');
    const wordUsed  = Array(WORD_LENGTH).fill(false);
    const guessUsed = Array(WORD_LENGTH).fill(false);
    for (let i = 0; i < WORD_LENGTH; i++) {
      if (guessArr[i] === wordArr[i]) {
        result[i]    = 'correct';
        wordUsed[i]  = true;
        guessUsed[i] = true;
      }
    }
    for (let i = 0; i < WORD_LENGTH; i++) {
      if (guessUsed[i]) continue;
      for (let j = 0; j < WORD_LENGTH; j++) {
        if (!wordUsed[j] && guessArr[i] === wordArr[j]) {
          result[i]   = 'present';
          wordUsed[j] = true;
          break;
        }
      }
    }
    return result;
  }

  function revealRow(row, guess, result, callback) {
    const DELAY = 240;
    for (let c = 0; c < WORD_LENGTH; c++) {
      const tile  = getTile(row, c);
      const inner = tile.querySelector('.tile-inner');
      setTimeout(() => {
        tile.classList.add(result[c]);
        inner.style.transition = 'transform 0.5s ease';
        inner.style.transform  = 'rotateX(360deg)';
      }, c * DELAY);
    }
    setTimeout(callback, WORD_LENGTH * DELAY + 500);
  }

  function shakeRow(row) {
    const rowEl = document.getElementById(`row-${row}`);
    rowEl.classList.remove('shake');
    void rowEl.offsetWidth;
    rowEl.classList.add('shake');
  }

  function bounceRow(row) {
    for (let c = 0; c < WORD_LENGTH; c++) {
      setTimeout(() => getTile(row, c).classList.add('bounce'), c * 100);
    }
  }

  const KEY_PRIORITY = { correct: 3, present: 2, absent: 1 };
  function updateKeyboard(guess, result) {
    for (let i = 0; i < WORD_LENGTH; i++) {
      const letter = guess[i];
      const state  = result[i];
      const btn    = document.querySelector(`.key[data-key="${letter}"]`);
      if (!btn) continue;
      const current = btn.classList.contains('correct') ? 'correct'
                    : btn.classList.contains('present') ? 'present'
                    : btn.classList.contains('absent')  ? 'absent' : null;
      if (!current || KEY_PRIORITY[state] > KEY_PRIORITY[current]) {
        if (current) btn.classList.remove(current);
        btn.classList.add(state);
      }
    }
  }

  function showToast(msg, duration = 2000) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.classList.add('toast');
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => {
      toast.style.opacity = '0';
      setTimeout(() => toast.remove(), 300);
    }, duration - 300);
  }

  function showModal() {
    document.getElementById('modal-overlay').classList.add('visible');
  }

  document.getElementById('continue-btn').addEventListener('click', () => {
    document.getElementById('modal-overlay').classList.remove('visible');
  });

  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) {
      document.getElementById('modal-overlay').classList.remove('visible');
    }
  });

  document.getElementById('hint-btn').addEventListener('click', () => {
    showToast(HINT_TEXT, 5000);
  });

  function getTile(row, col) {
    return document.getElementById(`tile-${row}-${col}`);
  }
</script>
</body>
</html>
